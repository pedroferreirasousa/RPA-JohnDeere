<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>JD Option Codes Portal</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --jd-green: #367c2b;
      --jd-green-dark: #2a6122;
      --jd-green-light: #e8f5e3;
      --jd-yellow: #ffde00;
      --surface: #f4f6f9;
      --card-shadow: 0 1px 3px rgba(0,0,0,.07), 0 4px 16px rgba(0,0,0,.06);
    }
    *, body { font-family: 'Inter', sans-serif; }
    body { background-color: var(--surface); }

    /* ── Navbar ── */
    .navbar-jd {
      background: linear-gradient(135deg, var(--jd-green-dark) 0%, var(--jd-green) 100%);
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
      padding: .85rem 0;
    }
    .navbar-jd .navbar-brand { letter-spacing: .3px; font-size: 1.05rem; }
    .navbar-jd .badge-version {
      background: rgba(255,255,255,.15);
      border: 1px solid rgba(255,255,255,.25);
      font-size: .68rem;
      font-weight: 500;
      padding: .25em .6em;
      border-radius: 20px;
    }

    /* ── Cards ── */
    .card {
      border-radius: 14px;
      box-shadow: var(--card-shadow);
      border: none;
      transition: box-shadow .2s;
    }
    .card:hover { box-shadow: 0 2px 6px rgba(0,0,0,.08), 0 8px 24px rgba(0,0,0,.09); }
    .card-header {
      background: #fff;
      border-bottom: 1px solid #edf0f4;
      border-radius: 14px 14px 0 0 !important;
      padding: .9rem 1.25rem;
    }
    .card-header .card-icon {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
    }
    .icon-green { background: var(--jd-green-light); color: var(--jd-green); }
    .icon-blue  { background: #e8f0fe; color: #1a73e8; }
    .icon-gray  { background: #f0f2f5; color: #6c757d; }

    /* ── Buttons ── */
    .btn-jd {
      background: var(--jd-green);
      color: #fff;
      border: none;
      font-weight: 600;
      letter-spacing: .2px;
    }
    .btn-jd:hover { background: var(--jd-green-dark); color: #fff; }
    .btn-jd:disabled { background: #a0b89c; color: #fff; }

    /* ── Badges / Status ── */
    .status-pill {
      display: inline-flex; align-items: center; gap: .4rem;
      padding: .45rem 1rem; border-radius: 50px;
      font-size: .82rem; font-weight: 600;
    }
    .status-pill.active   { background: #e8f5e3; color: #2a6122; }
    .status-pill.inactive { background: #fdecea; color: #c62828; }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      display: inline-block;
    }
    .status-dot.green { background: var(--jd-green); box-shadow: 0 0 0 2px rgba(54,124,43,.25); }
    .status-dot.red   { background: #e53935; box-shadow: 0 0 0 2px rgba(229,57,53,.25); }

    /* ── Chassi tags ── */
    .chassi-tag {
      font-family: 'Courier New', monospace;
      font-size: .78rem;
      background: #f8f9fa;
      border: 1px solid #dee2e6 !important;
      color: #495057;
      padding: .3rem .6rem;
      border-radius: 6px;
    }

    /* ── Table ── */
    .table { font-size: .875rem; }
    .table thead th {
      font-weight: 600;
      color: #6c757d;
      text-transform: uppercase;
      font-size: .72rem;
      letter-spacing: .5px;
      border-bottom: 2px solid #edf0f4;
    }
    .table tbody tr:hover { background: #f8f9fa; }

    /* ── Modal ── */
    .modal-content { border-radius: 16px; border: none; box-shadow: 0 8px 40px rgba(0,0,0,.18); }
    .modal-header { border-bottom: 1px solid #edf0f4; padding: 1.2rem 1.5rem .8rem; }
    .modal-footer { border-top: 1px solid #edf0f4; }

    /* ── Misc ── */
    .section-divider { border-top: 1px solid #edf0f4; margin: 1rem 0 .5rem; }
    .text-jd { color: var(--jd-green); }
  </style>
</head>
<body>
  <nav class="navbar navbar-jd navbar-dark mb-4">
    <div class="container d-flex align-items-center justify-content-between">
      <span class="navbar-brand fw-bold d-flex align-items-center gap-2 mb-0">
        <i class="fa-solid fa-tractor"></i>
        JD Option Codes <span class="text-white-50 fw-normal">|</span> Portal RPA
      </span>
      <span class="badge-version text-white">
        <i class="fa-solid fa-circle me-1" style="font-size:.45rem;vertical-align:middle;color:#7ddc6b;"></i>Online
      </span>
    </div>
  </nav>

  <div class="container pb-5">
    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
