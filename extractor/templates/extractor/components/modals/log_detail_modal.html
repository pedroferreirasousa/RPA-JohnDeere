{# modals/log_detail_modal.html — Modal de detalhes de log de execução #}
<div class="modal" id="logDetailModal">
  <div class="modal-box modal-lg">
    <div class="modal-header">
      <h5 class="modal-title">
        <i class="fa-solid fa-scroll"></i>Detalhes — <span id="log-date"></span>
      </h5>
      <button class="btn-close" data-close-modal aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body">
      <pre id="log-detail" class="pre-wrap"></pre>
    </div>
  </div>
</div>
